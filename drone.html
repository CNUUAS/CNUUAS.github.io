<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Page</title>
  <style>
    body {
      margin: 0;
      background: #0c0e14;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      color: #7dd3fc;
      margin-bottom: 24px;
    }

    .demo-box {
      width: 900px;
      max-width: 100%;
      height: 600px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Hexacopter Interactive Demo</h1>

  <div class="demo-box">
    <iframe src="dronemodel.html" title="Hexacopter Demo"></iframe>
  </div>

</html>
