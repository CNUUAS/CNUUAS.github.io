<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Drone Page</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            main {
                margin: 0;
                background: white;
                font-family: system-ui, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 40px 20px;
            }

            .demo-box {
                width: 900px;
                max-width: 100%;
                height: 600px;
                border-radius: 18px;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
            }

            iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
            }
        </style>
    </head>
    <body>
        <div id="navbar-placeholder"></div>

        <div class="container py-4 text-center" style="margin-top: 60px">
            <h1 class="display-4 fw-light">Hexacopter Interactive Demo</h1>
        </div>

        <main>
            <div class="demo-box" id="demoBox">
                <iframe src="dronemodel.html" title="Hexacopter Demo"></iframe>
            </div>
        </main>

        <div id="footer-placeholder"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/main.js"></script>
        <script>
            const demoBox = document.getElementById('demoBox');

            demoBox.addEventListener('mouseenter', () => {
                document.body.style.overflow = 'hidden';
            });

            demoBox.addEventListener('mouseleave', () => {
                document.body.style.overflow = '';
            });
        </script>
    </body>
</html>
